name: Bootstrap

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  remove-workflow:
    if: github.event.before == '0000000000000000000000000000000000000000' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log bootstrap context
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "before=${{ github.event.before }}"
          echo "first_push=${{ github.event.before == '0000000000000000000000000000000000000000' }}"
          echo "matches_default_branch=${{ github.ref_name == github.event.repository.default_branch }}"

      - name: Remove this workflow from the default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Removing .github/workflows/bootstrap.yml from ${GITHUB_REF_NAME}"
          git rm .github/workflows/bootstrap.yml
          git commit -m "chore: remove bootstrap workflow" || exit 0
          git push origin HEAD:${GITHUB_REF_NAME}
