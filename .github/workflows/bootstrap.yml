name: Bootstrap

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  issues: write

jobs:
  remove-workflow:
    if: github.event.before == '0000000000000000000000000000000000000000' && github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log bootstrap context
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref_name=${GITHUB_REF_NAME}"
          echo "default_branch=${{ github.event.repository.default_branch }}"
          echo "before=${{ github.event.before }}"
          echo "first_push=${{ github.event.before == '0000000000000000000000000000000000000000' }}"
          echo "matches_default_branch=${{ github.ref_name == github.event.repository.default_branch }}"

      - name: Create issues from templates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d .github/initial ]; then
            echo ".github/initial not found. Skipping issue creation."
            exit 0
          fi

          repo_full_name="${GITHUB_REPOSITORY}"
          repo_owner="${GITHUB_REPOSITORY_OWNER}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          default_branch="${{ github.event.repository.default_branch }}"

          escape_sed_replacement() {
            printf '%s' "$1" | sed -e 's/[\\/&]/\\\\&/g'
          }

          render_template() {
            local template_path="$1"
            local output_path="$2"

            sed \
              -e "s|{{REPO_FULL_NAME}}|$(escape_sed_replacement "${repo_full_name}")|g" \
              -e "s|{{REPO_OWNER}}|$(escape_sed_replacement "${repo_owner}")|g" \
              -e "s|{{REPO_NAME}}|$(escape_sed_replacement "${repo_name}")|g" \
              -e "s|{{REPO_URL}}|$(escape_sed_replacement "${repo_url}")|g" \
              -e "s|{{DEFAULT_BRANCH}}|$(escape_sed_replacement "${default_branch}")|g" \
              "${template_path}" > "${output_path}"
          }

          create_issue_from_template() {
            local template="$1"
            local rendered
            local title
            local body_file

            rendered=$(mktemp)
            render_template "${template}" "${rendered}"

            title=$(head -n 1 "${rendered}")
            body_file=$(mktemp)
            tail -n +2 "${rendered}" > "${body_file}"

            if [ -z "${title}" ]; then
              title=$(basename "${template}" -issue-template.md)
            fi

            echo "Creating issue from ${template}"
            echo "Title: ${title}"
            gh issue create --title "${title}" --body-file "${body_file}"

            issue_count=$((issue_count + 1))
            rm -f "${body_file}" "${rendered}"
          }

          issue_count=0

          WELCOME_template=".github/initial/WELCOME-issue-template.md"
          if [ -f "${WELCOME_template}" ]; then
            create_issue_from_template "${WELCOME_template}"
            echo "WELCOME issue created first."
          else
            echo "${WELCOME_template} not found. Skipping prioritized WELCOME issue."
          fi

          while IFS= read -r -d '' template; do
            if [ "${template}" = "${WELCOME_template}" ]; then
              continue
            fi
            create_issue_from_template "${template}"
          done < <(find .github/initial -type f -name '*-issue-template.md' -print0 | sort -z)

          echo "Created issues: ${issue_count}"

      - name: Generate .github/README.md from template
        run: |
          template=".github/initial/README-md-template.md"
          output=".github/README.md"

          if [ ! -f "${template}" ]; then
            echo "${template} not found. Skipping README generation."
            exit 0
          fi

          repo_full_name="${GITHUB_REPOSITORY}"
          repo_owner="${GITHUB_REPOSITORY_OWNER}"
          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          default_branch="${{ github.event.repository.default_branch }}"

          escape_sed_replacement() {
            printf '%s' "$1" | sed -e 's/[\\/&]/\\\\&/g'
          }

          sed \
            -e "s|{{REPO_FULL_NAME}}|$(escape_sed_replacement "${repo_full_name}")|g" \
            -e "s|{{REPO_OWNER}}|$(escape_sed_replacement "${repo_owner}")|g" \
            -e "s|{{REPO_NAME}}|$(escape_sed_replacement "${repo_name}")|g" \
            -e "s|{{REPO_URL}}|$(escape_sed_replacement "${repo_url}")|g" \
            -e "s|{{DEFAULT_BRANCH}}|$(escape_sed_replacement "${default_branch}")|g" \
            "${template}" > "${output}"

          echo "Generated ${output}"

      - name: Remove bootstrap files from the default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Removing bootstrap files from ${GITHUB_REF_NAME}"
          if [ -f .github/README.md ]; then
            git add .github/README.md
          fi
          git rm --ignore-unmatch README.md
          git rm -r --ignore-unmatch .github/initial
          git rm --ignore-unmatch .github/workflows/bootstrap.yml
          git commit -m "chore: complete bootstrap initialization" || exit 0
          git push origin HEAD:${GITHUB_REF_NAME}
